<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Personality Predictor</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f1a;
      --surface:   #151826;
      --card:      #1c1f33;
      --border:    #2a2e47;
      --accent:    #7c6ff7;
      --teal:      #3ecfcf;
      --intro:     #7c6ff7;
      --extro:     #f7706f;
      --text:      #e8eaf6;
      --muted:     #7a7f9e;
      --success:   #3ecfcf;
      --radius:    12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 80px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 40px;
      max-width: 560px;
    }
    .eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    h1 {
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    h1 span { color: var(--accent); }
    .subtitle {
      margin-top: 12px;
      font-size: 15px;
      color: var(--muted);
      line-height: 1.6;
    }

    /* ── Card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 32px;
      width: 100%;
      max-width: 560px;
    }

    /* ── Form sections ── */
    .section-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .fields { display: flex; flex-direction: column; gap: 20px; margin-bottom: 28px; }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .field .hint {
      font-size: 11px;
      color: #555a7a;
      margin-top: 4px;
      font-family: 'JetBrains Mono', monospace;
    }

    input[type="number"],
    select {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 11px 14px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      appearance: none;
      -webkit-appearance: none;
    }
    input[type="number"]:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,111,247,0.15);
    }
    /* hide number spinners */
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

    /* custom select arrow */
    .select-wrap { position: relative; }
    .select-wrap::after {
      content: '▾';
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      font-size: 12px;
    }

    /* ── Submit ── */
    button[type="submit"] {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 4px;
    }
    button[type="submit"]:hover  { opacity: 0.88; }
    button[type="submit"]:active { transform: scale(0.98); }
    button[type="submit"]:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Result panel ── */
    #result {
      margin-top: 28px;
      display: none;
      flex-direction: column;
      gap: 20px;
    }
    #result.visible { display: flex; }

    /* Personality label */
    .result-header {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .result-icon {
      width: 48px; height: 48px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .result-icon.introvert  { background: rgba(124,111,247,0.18); }
    .result-icon.extrovert  { background: rgba(247,112,111,0.18); }
    .result-label {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .result-label.introvert { color: var(--intro); }
    .result-label.extrovert { color: var(--extro); }
    .result-sub {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
    }



    /* Error */
    .error-box {
      display: none;
      background: rgba(247,112,111,0.1);
      border: 1px solid rgba(247,112,111,0.3);
      border-radius: var(--radius);
      padding: 14px 16px;
      font-size: 13px;
      color: #f7706f;
      margin-top: 16px;
    }
    .error-box.visible { display: block; }

    /* Loading spinner */
    .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin: 0 auto;
    }
    button[type="submit"].loading .btn-text { display: none; }
    button[type="submit"].loading .spinner  { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) {
      .card { padding: 24px 18px; }
    }
  </style>
</head>
<body>

  <header>
    <p class="eyebrow">ML Personality Model</p>
    <h1>Are you an <span>Introvert</span><br>or Extrovert?</h1>
    <p class="subtitle">Answer seven questions about your social habits.<br>The model predicts your personality type in real time.</p>
  </header>

  <div class="card">

    <!-- ── Numeric inputs ── -->
    <p class="section-label">Social Habits</p>
    <div class="fields">

      <div class="field">
        <label for="time_alone">Time Spent Alone <em style="font-style:normal;color:#555a7a">(hrs/day)</em></label>
        <input type="number" id="time_alone" name="Time_spent_Alone" min="0" max="24" step="0.5" placeholder="e.g. 5" />
        <p class="hint">0 – 24</p>
      </div>

      <div class="field">
        <label for="social_events">Social Event Attendance <em style="font-style:normal;color:#555a7a">(events/month)</em></label>
        <input type="number" id="social_events" name="Social_event_attendance" min="0" step="1" placeholder="e.g. 3" />
        <p class="hint">0 = never &nbsp;·&nbsp; higher = more often</p>
      </div>

      <div class="field">
        <label for="going_outside">Going Outside <em style="font-style:normal;color:#555a7a">(times/week)</em></label>
        <input type="number" id="going_outside" name="Going_outside" min="0" step="1" placeholder="e.g. 4" />
      </div>

      <div class="field">
        <label for="friends">Friends Circle Size</label>
        <input type="number" id="friends" name="Friends_circle_size" min="0" step="1" placeholder="e.g. 12" />
      </div>

      <div class="field">
        <label for="post_freq">Post Frequency <em style="font-style:normal;color:#555a7a">(posts/week)</em></label>
        <input type="number" id="post_freq" name="Post_frequency" min="0" step="1" placeholder="e.g. 2" />
        <p class="hint">Social-media posts</p>
      </div>

    </div>

    <!-- ── Categorical inputs ── -->
    <p class="section-label">Personality Signals</p>
    <div class="fields">

      <div class="field">
        <label for="stage_fear">Stage Fear</label>
        <div class="select-wrap">
          <select id="stage_fear" name="Stage_fear">
            <option value="" disabled selected>Select…</option>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label for="drained">Drained After Socializing</label>
        <div class="select-wrap">
          <select id="drained" name="Drained_after_socializing">
            <option value="" disabled selected>Select…</option>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
          </select>
        </div>
      </div>

    </div>

    <!-- ── Submit ── -->
    <button type="submit" id="submitBtn" onclick="submitForm()">
      <span class="btn-text">Predict Personality</span>
      <div class="spinner"></div>
    </button>

    <!-- ── Error ── -->
    <div class="error-box" id="errorBox"></div>

    <!-- ── Result ── -->
    <div id="result">

      <div class="result-header">
        <div class="result-icon" id="resultIcon"></div>
        <div>
          <div class="result-label" id="resultLabel"></div>
          <div class="result-sub" id="resultSub"></div>
        </div>
      </div>



    </div>
  </div>

  <script>
    async function submitForm() {
      const btn      = document.getElementById('submitBtn');
      const errorBox = document.getElementById('errorBox');
      const result   = document.getElementById('result');

      errorBox.classList.remove('visible');
      result.classList.remove('visible');

      // ── Gather values ──
      const numericIds = ['time_alone','social_events','going_outside','friends','post_freq'];
      const numericKeys = ['Time_spent_Alone','Social_event_attendance','Going_outside','Friends_circle_size','Post_frequency'];
      const payload = {};

      for (let i = 0; i < numericIds.length; i++) {
        const val = document.getElementById(numericIds[i]).value.trim();
        payload[numericKeys[i]] = val === '' ? null : parseFloat(val);
      }

      const stageFear = document.getElementById('stage_fear').value;
      const drained   = document.getElementById('drained').value;
      payload['Stage_fear']                = stageFear  || null;
      payload['Drained_after_socializing'] = drained    || null;

      // ── Call API ──
      btn.disabled = true;
      btn.classList.add('loading');

      try {
        const res = await fetch('/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || `Server error ${res.status}`);
        }

        showResult(data);

      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.classList.add('visible');
      } finally {
        btn.disabled = false;
        btn.classList.remove('loading');
      }
    }

    function showResult(data) {
      const isIntrovert = data.prediction.toLowerCase() === 'introvert';

      document.getElementById('resultIcon').textContent = isIntrovert ? '🌙' : '☀️';
      document.getElementById('resultIcon').className   = `result-icon ${isIntrovert ? 'introvert' : 'extrovert'}`;
      document.getElementById('resultLabel').textContent = data.prediction;
      document.getElementById('resultLabel').className   = `result-label ${isIntrovert ? 'introvert' : 'extrovert'}`;
      document.getElementById('resultSub').textContent   =
        isIntrovert ? 'Prefers solitude, deep thinking, and close connections.'
                    : 'Gains energy from social interaction and external engagement.';

      const resultEl = document.getElementById('result');
      resultEl.classList.add('visible');
      resultEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  </script>

</body>
</html>
